# nfpm.yaml — luci-app-lpac-manager v1.3.0
# Unified: lpac wrapper + lpac-esim backend + LuCI WebUI
# Architecture: noarch/all — pure shell + Lua + HTML + JS
#
# Changelog:
#   1.3.0 - Renamed lpac-esim-qmi → lpac-esim, package → luci-app-lpac-manager
#           Diagnostics tab, vivid CSS, MBIM full support, ANSI/jq/async fixes
#   1.2.2 - Initial unified nfpm config
name: "luci-app-lpac-manager"
arch: "all"
platform: "linux"
version: "${PKG_VER}"
section: "luci"
priority: "optional"
maintainer: "Medvedolog <Medvedolog@github.com>"
homepage: "https://github.com/Medvedolog/lpac-esim-openwrt"
license: "MIT"
description: |
  LuCI WebUI and shell backend for eSIM profile management on OpenWrt.
  Includes:
    - LuCI frontend (eSIM Manager)
    - lpac-esim shell backend (QMI / AT / MBIM)
    - /usr/bin/lpac wrapper script
  Requires separate: lpac 2.3.0+, modem transport utilities

depends:
  - luci-base
  - jq
  - coreutils-timeout

contents:
  - src: ./pkgroot/usr/lib/lua/luci/
    dst: /usr/lib/lua/luci
    type: tree

  - src: ./pkgroot/www/luci-static/resources/
    dst: /www/luci-static/resources
    type: tree

  - src: ./pkgroot/usr/share/luci/menu.d/
    dst: /usr/share/luci/menu.d
    type: tree

  - src: ./pkgroot/usr/share/rpcd/acl.d/
    dst: /usr/share/rpcd/acl.d
    type: tree

  - src: ./pkgroot/etc/config/lpac-esim
    dst: /etc/config/lpac-esim
    type: "config|noreplace"
    file_info:
      mode: 0644

  - src: ./pkgroot/usr/bin/lpac-esim
    dst: /usr/bin/lpac-esim
    file_info:
      mode: 0755

  - src: ./pkgroot/usr/bin/lpac
    dst: /usr/bin/lpac
    file_info:
      mode: 0755

scripts:
  postinstall: ./scripts/postinst
  preremove: ./scripts/prerm

apk:
  arch: "noarch"

ipk:
  arch: "all"
