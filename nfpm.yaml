# ==============================================================================
# nFPM Build Configuration — luci-app-lpac-esim v1.2.1
# LuCI WebUI for eSIM profile management on OpenWrt.
# Architecture: noarch / all — pure Lua + HTML + JS, no compilation needed.
#
# NOTE: This nfpm.yaml works with pkgroot/ assembled by the workflow.
# Do NOT run nfpm directly without building pkgroot first.
# ==============================================================================
name: "luci-app-lpac-esim"
arch: "all"
platform: "linux"
version: "${PKG_VER}"
section: "luci"
maintainer: "Medvedolog <Medvedolog@github.com>"
homepage: "https://github.com/Medvedolog/lpac-esim-openwrt"
description: |
  LuCI WebUI for eSIM profile management on OpenWrt.
  Provides web interface for lpac-esim-qmi backend script.
  Supports QMI, AT, and MBIM backends.
  Features: profile list/switch/download/delete/rename, modem reboot,
  chip info, notification management, UCI-based configuration.
depends:
  - luci-base
  - lpac-esim-qmi
contents:
  - src: ./pkgroot/usr/lib/lua/luci/
    dst: /usr/lib/lua/luci
    type: tree
  - src: ./pkgroot/www/luci-static/resources/
    dst: /www/luci-static/resources
    type: tree
  - src: ./pkgroot/usr/share/luci/menu.d/
    dst: /usr/share/luci/menu.d
    type: tree
  - src: ./pkgroot/usr/share/rpcd/acl.d/
    dst: /usr/share/rpcd/acl.d
    type: tree
  - src: ./pkgroot/etc/config/lpac-esim
    dst: /etc/config/lpac-esim
    type: "config|noreplace"
    file_info:
      mode: 0644
scripts:
  postinstall: ./scripts/postinst
  preremove: ./scripts/prerm
apk:
  arch: "noarch"
ipk:
  arch: "all"
