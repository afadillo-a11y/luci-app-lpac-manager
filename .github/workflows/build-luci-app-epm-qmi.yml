name: Build and Release LuCI App EPM QMI for lpac 2.3.0

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Enter package version (e.g. 2.3.0-1) or branch label'
        required: true
        default: '2.3.0-1'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_NAME: luci-app-epm-qmi

    steps:
      - name: Extract version
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Checkout local repository
        uses: actions/checkout@v4

      - name: Install nFPM and helpers
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y dos2unix curl tar xz-utils jq rsync

          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Generate package root from repository tree
        shell: bash
        run: |
          set -euxo pipefail

          APPDIR="${GITHUB_WORKSPACE}/luci-app-epm"
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          test -d "${APPDIR}"
          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}"

          # 1) Copy LuCI Lua sources wholesale
          mkdir -p "${PKGROOT}/usr/lib/lua/luci"
          rsync -a "${APPDIR}/luasrc/" "${PKGROOT}/usr/lib/lua/luci/"

          # 2) Copy static resources wholesale
          mkdir -p "${PKGROOT}/www/luci-static/resources"
          rsync -a "${APPDIR}/htdocs/luci-static/resources/" "${PKGROOT}/www/luci-static/resources/"

          # 3) Copy root payload wholesale if present
          if [ -d "${APPDIR}/root" ]; then
            rsync -a "${APPDIR}/root/" "${PKGROOT}/"
          fi

          # 4) Normalize LuCI menu path:
          # repo may currently use root/usr/share/menu.d, but runtime path should be /usr/share/luci/menu.d
          mkdir -p "${PKGROOT}/usr/share/luci/menu.d"
          if [ -d "${PKGROOT}/usr/share/menu.d" ]; then
            rsync -a "${PKGROOT}/usr/share/menu.d/" "${PKGROOT}/usr/share/luci/menu.d/"
            rm -rf "${PKGROOT}/usr/share/menu.d"
          fi

          # 5) Ensure config exists
          mkdir -p "${PKGROOT}/etc/config"
          if [ ! -f "${PKGROOT}/etc/config/epm" ]; then
            cat > "${PKGROOT}/etc/config/epm" <<'EOF'
          config epm 'config'
              option apdu_backend 'qmi'
              option http_backend 'curl'
              option at_device '/dev/ttyUSB3'
              option qmi_device '/dev/cdc-wdm0'
              option qmi_sim_slot '1'
              option mbim_device '/dev/cdc-wdm0'
              option mbim_proxy '0'
              option reboot_method 'qmi'
              option reboot_at_command 'AT+CFUN=1,1'
              option reboot_at_device '/dev/ttyUSB3'
              option reboot_qmi_device '/dev/cdc-wdm0'
              option reboot_qmi_slot '1'
              option reboot_mbim_device '/dev/cdc-wdm0'
              option reboot_custom_command 'echo "Custom reboot command here"'
              option json_output '0'
          EOF
          fi

          # 6) Ensure ACL exists
          mkdir -p "${PKGROOT}/usr/share/rpcd/acl.d"
          if [ ! -f "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-epm-qmi.json" ]; then
            cat > "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-epm-qmi.json" <<'EOF'
          {
            "luci-app-epm-qmi": {
              "description": "Grant access to eSIM Profile Manager QMI/AT frontend for lpac 2.3.0",
              "read": {
                "uci": [ "epm" ],
                "file": {
                  "/usr/bin/lpac": [ "exec" ],
                  "/usr/sbin/qmicli": [ "exec" ],
                  "/sbin/logread": [ "exec" ]
                }
              },
              "write": {
                "uci": [ "epm" ]
              }
            }
          }
          EOF
          fi

          # 7) If legacy menu file exists, adjust ACL dependency on the fly
          if [ -f "${PKGROOT}/usr/share/luci/menu.d/luci-app-epm.json" ]; then
            sed -i 's/"luci-app-epm"/"luci-app-epm-qmi"/g' "${PKGROOT}/usr/share/luci/menu.d/luci-app-epm.json"
            sed -i 's/"eSIM Profile Manager"/"eSIM Profile Manager (QMI)"/g' "${PKGROOT}/usr/share/luci/menu.d/luci-app-epm.json" || true
          fi

          # 8) Normalize line endings for text assets
          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' -o -name '*.html' -o \
            -name '*.css' -o -path '*/etc/config/*' -o -name '*.sh' \
          \) -print0 | xargs -0 -r dos2unix

          # 9) Show resulting tree for debugging
          find "${PKGROOT}" -maxdepth 5 -type f | sort

      - name: Build IPK and APK packages with nFPM
        shell: bash
        run: |
          set -euxo pipefail

          export PKG_VER="${{ env.VERSION }}"
          ARCHS=("aarch64_generic" "aarch64_cortex-a53")

          cat > postinst.sh <<'EOF'
          #!/bin/sh
          set +e

          echo "=============================================="
          echo "luci-app-epm-qmi installed."
          echo
          echo "This is the QMI/AT LuCI frontend for lpac 2.3.0."
          echo "The lpac backend is NOT bundled in this package."
          echo
          echo "Install the matching backend separately."
          echo "Examples:"
          echo "  opkg install lpac libqmi glib2 libcurl"
          echo "or"
          echo "  apk add lpac libqmi glib2 libcurl"
          echo
          echo "Then reopen LuCI."
          echo "=============================================="

          if [ -x /etc/init.d/rpcd ]; then
            /etc/init.d/rpcd reload >/dev/null 2>&1 || true
          fi

          rm -f /tmp/luci-indexcache /tmp/luci-modulecache >/dev/null 2>&1 || true
          exit 0
          EOF

          cat > prerm.sh <<'EOF'
          #!/bin/sh
          set +e
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache >/dev/null 2>&1 || true
          exit 0
          EOF

          cat > postrm.sh <<'EOF'
          #!/bin/sh
          set +e
          if [ -x /etc/init.d/rpcd ]; then
            /etc/init.d/rpcd reload >/dev/null 2>&1 || true
          fi
          rm -f /tmp/luci-indexcache /tmp/luci-modulecache >/dev/null 2>&1 || true
          exit 0
          EOF

          chmod 755 postinst.sh prerm.sh postrm.sh

          export PKG_DESC="LuCI frontend for lpac 2.3.0 using native QMI with AT fallback on OpenWrt. This package is named luci-app-epm-qmi to distinguish it from older uqmi/mbim-oriented variants."

          export SOURCE_DATE_EPOCH=1704067200
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${PKG_VER}
          maintainer: OpenWrt eSIM integration
          description: "${PKG_DESC}"
          homepage: https://github.com/estkme-group/lpac
          contents:
            - src: ./pkgroot/usr/lib/lua/luci/
              dst: /usr/lib/lua/luci
              type: tree
            - src: ./pkgroot/www/luci-static/resources/
              dst: /www/luci-static/resources
              type: tree
            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree
            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree
            - src: ./pkgroot/etc/config/epm
              dst: /etc/config/epm
              type: config|noreplace
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
            postremove: ./postrm.sh
          EOF
            nfpm package --config nfpm_ipk.yaml --packager ipk --target "${PKG_NAME}_${PKG_VER}_${ARCH}.ipk"
          done

          unset SOURCE_DATE_EPOCH
          for ARCH in "${ARCHS[@]}"; do
            cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${ARCH}
          platform: linux
          version: ${PKG_VER}
          maintainer: OpenWrt eSIM integration
          description: "${PKG_DESC}"
          homepage: https://github.com/estkme-group/lpac
          contents:
            - src: ./pkgroot/usr/lib/lua/luci/
              dst: /usr/lib/lua/luci
              type: tree
            - src: ./pkgroot/www/luci-static/resources/
              dst: /www/luci-static/resources
              type: tree
            - src: ./pkgroot/usr/share/luci/menu.d/
              dst: /usr/share/luci/menu.d
              type: tree
            - src: ./pkgroot/usr/share/rpcd/acl.d/
              dst: /usr/share/rpcd/acl.d
              type: tree
            - src: ./pkgroot/etc/config/epm
              dst: /etc/config/epm
              type: config|noreplace
              file_info:
                mode: 0644
          scripts:
            postinstall: ./postinst.sh
            preremove: ./prerm.sh
            postremove: ./postrm.sh
          EOF
            nfpm package --config nfpm_apk.yaml --packager apk --target "${PKG_NAME}_${PKG_VER}_${ARCH}.apk"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          name: Release ${{ env.VERSION }}
          tag_name: ${{ env.VERSION }}
          prerelease: false
          draft: false
