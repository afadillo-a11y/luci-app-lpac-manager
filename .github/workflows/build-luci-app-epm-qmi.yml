name: Build and Release luci-app-lpac-manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Package version (e.g. 1.3.5)'
        required: true
        default: '1.3.5'

jobs:
  build:
    name: Build ${{ matrix.target.ext }} packages
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - { sdk: "aarch64_cortex-a53-24.10.5", ext: "ipk" }
          - { sdk: "aarch64_cortex-a53-25.12.2", ext: "apk" }

    env:
      PKG_NAME: luci-app-lpac-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Install helpers
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y dos2unix jq rsync

      - name: Assemble pkgroot (Files & Cleanup)
        shell: bash
        run: |
          set -euxo pipefail
          REPO_ROOT="${GITHUB_WORKSPACE}"
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}"

          # Copy LuCI files
          [ -d "${REPO_ROOT}/src/usr" ] && cp -a "${REPO_ROOT}/src/usr" "${PKGROOT}/"
          [ -d "${REPO_ROOT}/root" ] && cp -a "${REPO_ROOT}/root/." "${PKGROOT}/"
          [ -d "${REPO_ROOT}/htdocs" ] && mkdir -p "${PKGROOT}/www" && cp -a "${REPO_ROOT}/htdocs/." "${PKGROOT}/www/"

          # Normalize menu paths
          mkdir -p "${PKGROOT}/usr/share/luci/menu.d"
          if [ -d "${PKGROOT}/usr/share/menu.d" ]; then
            cp -a "${PKGROOT}/usr/share/menu.d/." "${PKGROOT}/usr/share/luci/menu.d/"
            rm -rf "${PKGROOT}/usr/share/menu.d"
          fi

          # CLEANUP: Remove Windows CRLF and BOM (Critical for rpcd)
          find "${PKGROOT}" -type f \( -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \) -exec dos2unix {} +
          find "${PKGROOT}" -type f \( -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \) -exec sed -i '1s/^\xef\xbb\xbf//' {} +

          # VALIDATE JSON
          find "${PKGROOT}" -type f -name "*.json" -exec sh -c 'cat "{}" | jq . > /dev/null || (echo "Syntax error in JSON: {}" && exit 1)' \;

          # Permissions
          find "${PKGROOT}/usr/bin" -type f -exec chmod 0755 {} \; 2>/dev/null || true

      - name: Prepare OpenWrt feed & Makefile
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p openwrt-feed/luci-app-lpac-manager
          mkdir -p .github/openwrt-helper

          # Copy assembled files to feed directory
          cp -a pkgroot openwrt-feed/luci-app-lpac-manager/

          cat > openwrt-feed/luci-app-lpac-manager/Makefile <<'EOF'
          include $(TOPDIR)/rules.mk

          PKG_NAME:=luci-app-lpac-manager
          PKG_VERSION:=$(PKG_VER)
          PKG_RELEASE:=1
          PKG_MAINTAINER:=Medvedolog <Medvedolog@github.com>

          include $(INCLUDE_DIR)/package.mk

          define Package/luci-app-lpac-manager
            SECTION:=luci
            CATEGORY:=LuCI
            SUBMENU:=3. Applications
            TITLE:=eSIM profile management for OpenWrt
            DEPENDS:=+luci-base +jq
            PKGARCH:=all
          endef

          define Package/luci-app-lpac-manager/description
            LuCI web UI and lpac-esim backend for managing eSIM profiles.
          endef

          define Build/Compile
          endef

          define Package/luci-app-lpac-manager/install
          	$(INSTALL_DIR) $(1)/
          	cp -a ./pkgroot/* $(1)/
          endef

          define Package/luci-app-lpac-manager/postinst
          #!/bin/sh
          [ -n "$${IPKG_INSTROOT}" ] || {
              rm -f /tmp/luci-indexcache /tmp/luci-modulecache
              /etc/init.d/rpcd restart
          }
          exit 0
          endef

          $(eval $(call BuildPackage,luci-app-lpac-manager))
          EOF

          # Replace @ with TAB in Makefile (just in case)
          python3 - <<'PY'
          from pathlib import Path
          p = Path("openwrt-feed/luci-app-lpac-manager/Makefile")
          text = p.read_text()
          text = "\n".join(("\t" + line[1:]) if line.startswith("@") else line for line in text.splitlines()) + "\n"
          p.write_text(text)
          PY

          cat > .github/openwrt-helper/build.sh <<'EOF'
          #!/bin/bash
          set -euxo pipefail
          cd /builder
          [ ! -d ./scripts ] && ./setup.sh

          echo "src-link custom /work/openwrt-feed" >> feeds.conf.default
          ./scripts/feeds update custom
          ./scripts/feeds install -p custom luci-app-lpac-manager

          cat >> .config <<'CFG'
          CONFIG_PACKAGE_luci-app-lpac-manager=y
          CFG

          make defconfig
          make package/feeds/custom/luci-app-lpac-manager/compile V=s -j"$(nproc)"

          mkdir -p /work/dist
          find bin/ -type f \( -name "luci-app-lpac-manager_*.ipk" -o -name "luci-app-lpac-manager-*.apk" \) -exec cp -v {} /work/dist/ \;
          EOF
          chmod +x .github/openwrt-helper/build.sh

      - name: Build in OpenWrt SDK
        env:
          PKG_VER: ${{ env.VERSION }}
        shell: bash
        run: |
          set -euxo pipefail
          docker pull openwrt/sdk:${{ matrix.target.sdk }}
          docker run --rm \
            --user root \
            -e PKG_VER="${PKG_VER}" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /builder \
            openwrt/sdk:${{ matrix.target.sdk }} \
            /bin/bash /work/.github/openwrt-helper/build.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-lpac-manager-${{ matrix.target.ext }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.build_target || github.ref_name }}
          name: "Release ${{ github.event.inputs.build_target || github.ref_name }}"
          draft: false
          prerelease: false
          files: release-assets/*
          body: |
            ## luci-app-lpac-manager ${{ github.event.inputs.build_target || github.ref_name }}
            
            Native OpenWrt packages built via official SDK.
            
            - **`*.ipk`** — for OpenWrt 24.x
            - **`*.apk`** — for OpenWrt 25.12+
