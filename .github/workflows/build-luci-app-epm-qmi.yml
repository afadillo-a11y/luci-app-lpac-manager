name: Build and Release luci-app-lpac-manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Package version (e.g. 1.3.5)'
        required: true
        default: '1.3.5'

jobs:
  release:
    name: Build IPK and Alpine APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_NAME: luci-app-lpac-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Install nFPM and helpers
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y dos2unix curl tar jq rsync file

          # Pin nFPM version for consistent IPK builds
          NFPM_VER="2.35.0"
          curl -fsSL \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" \
            | tar -xz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Assemble pkgroot from source tree
        shell: bash
        run: |
          set -euxo pipefail

          REPO_ROOT="${GITHUB_WORKSPACE}"
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          # Fix executable permissions (critical if committed from Windows)
          [ -d "${REPO_ROOT}/scripts" ] && chmod +x "${REPO_ROOT}/scripts/"* || true
          [ -d "${REPO_ROOT}/packaging/apk" ] && chmod +x "${REPO_ROOT}/packaging/apk/"* || true

          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}"

          # 1) Lua controller + views
          [ -d "${REPO_ROOT}/src/usr/lib/lua/luci" ] && \
            mkdir -p "${PKGROOT}/usr/lib/lua/luci" && \
            rsync -a "${REPO_ROOT}/src/usr/lib/lua/luci/" "${PKGROOT}/usr/lib/lua/luci/"

          # 2) Backend shell script
          [ -d "${REPO_ROOT}/src/usr/bin" ] && \
            mkdir -p "${PKGROOT}/usr/bin" && \
            rsync -a "${REPO_ROOT}/src/usr/bin/" "${PKGROOT}/usr/bin/" && \
            find "${PKGROOT}/usr/bin" -type f -exec chmod 0755 {} \;

          # 3) Static web resources (JS, CSS)
          [ -d "${REPO_ROOT}/htdocs/luci-static/resources" ] && \
            mkdir -p "${PKGROOT}/www/luci-static/resources" && \
            rsync -a "${REPO_ROOT}/htdocs/luci-static/resources/" "${PKGROOT}/www/luci-static/resources/"

          # 4) Root overlay (menu.d, acl.d)
          [ -d "${REPO_ROOT}/root" ] && \
            rsync -a "${REPO_ROOT}/root/" "${PKGROOT}/"

          # 5) Normalize legacy menu path
          mkdir -p "${PKGROOT}/usr/share/luci/menu.d"
          if [ -d "${PKGROOT}/usr/share/menu.d" ]; then
            rsync -a "${PKGROOT}/usr/share/menu.d/" "${PKGROOT}/usr/share/luci/menu.d/"
            rm -rf "${PKGROOT}/usr/share/menu.d"
          fi

          # 6) UCI config
          mkdir -p "${PKGROOT}/etc/config"
          [ -f "${REPO_ROOT}/etc/config/lpac-esim" ] && \
            cp "${REPO_ROOT}/etc/config/lpac-esim" "${PKGROOT}/etc/config/lpac-esim"

          # 7) Normalize line endings and strip BOM
          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \
            -o -name '*.css' -o -path '*/etc/config/*' -o -path '*/usr/bin/*' \
          \) -print0 | xargs -0 -r dos2unix

          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.htm' -o -path '*/usr/bin/*' \
          \) -print0 | xargs -0 -r sed -i '1s/^\xef\xbb\xbf//'

          # 8) Sanity checks
          echo "=== pkgroot contents ==="
          find "${PKGROOT}" -maxdepth 8 -type f | sort

          test -f "${PKGROOT}/etc/config/lpac-esim"
          test -f "${PKGROOT}/usr/lib/lua/luci/controller/lpac_esim.lua"
          test -d "${PKGROOT}/www/luci-static/resources/lpac-esim"
          test -f "${PKGROOT}/usr/share/luci/menu.d/luci-app-lpac-esim.json"
          test -f "${PKGROOT}/usr/share/rpcd/acl.d/luci-app-lpac-esim.json"
          test -f "${PKGROOT}/usr/bin/lpac-esim"
          echo "All sanity checks passed."

      - name: Build IPK with nFPM
        shell: bash
        run: |
          set -euxo pipefail
          export PKG_VER="${{ env.VERSION }}"
          export SOURCE_DATE_EPOCH=1704067200

          nfpm package \
            --config nfpm.yaml \
            --packager ipk \
            --target "${PKG_NAME}_${PKG_VER}_all.ipk"

          ls -lh "${PKG_NAME}_${PKG_VER}_all.ipk"

      - name: Build APK via Alpine abuild
        shell: bash
        run: |
          set -euxo pipefail
          export PKG_VER="${{ env.VERSION }}"
          export APK_DIR="${GITHUB_WORKSPACE}/packaging/apk"

          mkdir -p "${APK_DIR}"

          # Pass assembled pkgroot into Alpine build directory
          cp -a "${GITHUB_WORKSPACE}/pkgroot" "${APK_DIR}/"

          # Generate APKBUILD (no leading whitespace in heredoc)
          cat > "${APK_DIR}/APKBUILD" <<APKEOF
# Contributor: Medvedolog <Medvedolog@github.com>
# Maintainer: Medvedolog <Medvedolog@github.com>
pkgname="luci-app-lpac-manager"
pkgver="${PKG_VER}"
pkgrel=1
pkgdesc="eSIM profile management for OpenWrt"
url="https://github.com/Medvedolog/lpac-esim-openwrt"
arch="noarch"
license="MIT"
depends="luci-base jq"
install="\$pkgname.post-install \$pkgname.pre-deinstall"
source=""

build() {
    return 0
}

package() {
    mkdir -p "\$pkgdir"
    cp -a "\$builddir"/pkgroot/* "\$pkgdir"/
}
APKEOF

          # Build inside Alpine container
          docker run --rm \
            -v "${APK_DIR}:/work" \
            -w /work \
            alpine:edge \
            sh -c "
              apk add --no-cache alpine-sdk sudo
              adduser -D -G abuild builder
              chown -R builder:abuild /work
              su builder -c 'abuild-keygen -a -i -n'
              su builder -c 'REPODEST=/work/out abuild -r'
              APK_FILE=\$(find /work/out -type f -name '*.apk' ! -name 'APKINDEX*' | head -n1)
              cp \"\$APK_FILE\" \"/work/${PKG_NAME}-${PKG_VER}-r1_noarch.apk\"
            "

          mv "${APK_DIR}"/*_noarch.apk ./
          ls -lh *.apk

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ env.VERSION }}
          path: |
            *.ipk
            *.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          name: "Release ${{ env.VERSION }}"
          tag_name: "v${{ env.VERSION }}"
          prerelease: false
          draft: false
          body: |
            ## luci-app-lpac-manager ${{ env.VERSION }}

            eSIM profile management for OpenWrt via lpac 2.3.0.

            ### Install

            **OpenWrt 24.x (opkg):**
            ```sh
            opkg install luci-app-lpac-manager_${{ env.VERSION }}_all.ipk
            ```

            **OpenWrt 25.12+ (apk):**
            ```sh
            apk add --allow-untrusted luci-app-lpac-manager-${{ env.VERSION }}-r1_noarch.apk
            ```

            **Prerequisites:** `lpac`, `jq`, `luci-base`. For MBIM: `libmbim`, `mbim-utils`. For AT Terminal: `atinout`.
