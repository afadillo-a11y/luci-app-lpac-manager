name: Build and Release luci-app-lpac-manager

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_target:
        description: 'Package version (e.g. 1.3.5)'
        required: true
        default: '1.3.5'

jobs:
  release:
    name: Build IPK and Alpine APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PKG_NAME: luci-app-lpac-manager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        shell: bash
        run: |
          set -euxo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.build_target }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          else
            echo "VERSION=nightly" >> "$GITHUB_ENV"
          fi

      - name: Install nFPM and helpers
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y dos2unix curl tar jq rsync file

          # Install nFPM for IPK support
          NFPM_VER="2.46.0"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz nfpm
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Assemble pkgroot from source tree
        shell: bash
        run: |
          set -euxo pipefail
          REPO_ROOT="${GITHUB_WORKSPACE}"
          PKGROOT="${GITHUB_WORKSPACE}/pkgroot"

          rm -rf "${PKGROOT}"
          mkdir -p "${PKGROOT}"

          # 1. Copy source files
          if [ -d "${REPO_ROOT}/src/usr/lib/lua/luci" ]; then
            mkdir -p "${PKGROOT}/usr/lib/lua/luci"
            rsync -a "${REPO_ROOT}/src/usr/lib/lua/luci/" "${PKGROOT}/usr/lib/lua/luci/"
          fi

          if [ -d "${REPO_ROOT}/src/usr/bin" ]; then
            mkdir -p "${PKGROOT}/usr/bin"
            rsync -a "${REPO_ROOT}/src/usr/bin/" "${PKGROOT}/usr/bin/"
          fi

          if [ -d "${REPO_ROOT}/htdocs/luci-static/resources" ]; then
            mkdir -p "${PKGROOT}/www/luci-static/resources"
            rsync -a "${REPO_ROOT}/htdocs/luci-static/resources/" "${PKGROOT}/www/luci-static/resources/"
          fi

          if [ -d "${REPO_ROOT}/root" ]; then
            rsync -a "${REPO_ROOT}/root/" "${PKGROOT}/"
          fi

          # 2. Normalize menu paths
          mkdir -p "${PKGROOT}/usr/share/luci/menu.d"
          if [ -d "${PKGROOT}/usr/share/menu.d" ]; then
            rsync -a "${PKGROOT}/usr/share/menu.d/" "${PKGROOT}/usr/share/luci/menu.d/"
            rm -rf "${PKGROOT}/usr/share/menu.d"
          fi

          # 3. Handle UCI config
          mkdir -p "${PKGROOT}/etc/config"
          if [ -f "${REPO_ROOT}/etc/config/lpac-esim" ]; then
            cp "${REPO_ROOT}/etc/config/lpac-esim" "${PKGROOT}/etc/config/lpac-esim"
          fi

          # 4. CLEANUP: Remove Windows CRLF and BOM (Critical for rpcd)
          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \
            -o -name '*.css' -o -path '*/etc/config/*' -o -path '*/usr/bin/*' \
          \) -exec dos2unix {} +

          find "${PKGROOT}" -type f \( \
            -name '*.lua' -o -name '*.js' -o -name '*.json' -o -name '*.htm' \
          \) -exec sed -i '1s/^\xef\xbb\xbf//' {} +

          # 5. VALIDATE: Check JSON syntax before packaging
          echo "Validating JSON files..."
          find "${PKGROOT}" -type f -name "*.json" -exec sh -c 'cat "{}" | jq . > /dev/null || (echo "Syntax error in JSON: {}" && exit 1)' \;

          # 6. Set permissions
          find "${PKGROOT}/usr/bin" -type f -exec chmod 0755 {} \; 2>/dev/null || true
          if [ -d "${REPO_ROOT}/scripts" ]; then chmod +x "${REPO_ROOT}/scripts/"*; fi

      - name: Build IPK with nFPM
        shell: bash
        run: |
          set -euxo pipefail
          export PKG_VER="${{ env.VERSION }}"
          export SOURCE_DATE_EPOCH=1704067200

          cat > nfpm.yaml <<EOF
          name: "luci-app-lpac-manager"
          platform: "linux"
          arch: "all"
          version: "${PKG_VER}"
          section: "net"
          maintainer: "Medvedolog <Medvedolog@github.com>"
          description: |
            eSIM profile management for OpenWrt.
          depends:
            - luci-base
            - jq
          contents:
            - src: ./pkgroot/usr
              dst: /usr
              type: tree
            - src: ./pkgroot/www
              dst: /www
              type: tree
            - src: ./pkgroot/etc
              dst: /etc
              type: tree
          scripts:
            postinstall: ./scripts/postinst
            preremove: ./scripts/prerm
          EOF

          nfpm package --config nfpm.yaml --packager ipk --target "${PKG_NAME}_${PKG_VER}_all.ipk"

      - name: Build APK via Alpine abuild
        shell: bash
        run: |
          set -euxo pipefail
          export PKG_VER="${{ env.VERSION }}"
          export APK_DIR="${GITHUB_WORKSPACE}/packaging/apk"
          
          mkdir -p "${APK_DIR}"
          cp -a "${GITHUB_WORKSPACE}/pkgroot" "${APK_DIR}/"

          cat > "${APK_DIR}/APKBUILD" <<EOF
          # Maintainer: Medvedolog <Medvedolog@github.com>
          pkgname="luci-app-lpac-manager"
          pkgver="${PKG_VER}"
          pkgrel=1
          pkgdesc="eSIM profile management for OpenWrt"
          url="https://github.com/Medvedolog/lpac-esim-openwrt"
          arch="noarch"
          license="MIT"
          depends="luci-base jq"
          install="\$pkgname.post-install \$pkgname.pre-deinstall"
          options="!check !tracedeps"

          package() {
              mkdir -p "\$pkgdir"
              cp -a "\$startdir"/pkgroot/* "\$pkgdir"/
          }
          EOF

          if [ ! -f "${APK_DIR}/luci-app-lpac-manager.post-install" ]; then
            echo -e "#!/bin/sh\nexit 0" > "${APK_DIR}/luci-app-lpac-manager.post-install"
          fi

          if [ ! -f "${APK_DIR}/luci-app-lpac-manager.pre-deinstall" ]; then
            echo -e "#!/bin/sh\nexit 0" > "${APK_DIR}/luci-app-lpac-manager.pre-deinstall"
          fi

          docker run --rm -v "${APK_DIR}:/work" -w /work alpine:edge sh -c "
            apk add --no-cache alpine-sdk sudo
            adduser -D -G abuild builder
            echo 'builder ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
            chown -R builder:abuild /work
            su builder -c 'abuild-keygen -a -i -n'
            su builder -c 'REPODEST=/work/out abuild -d'
            APK_FILE=\$(find /work/out -type f -name \"*.apk\" ! -name \"APKINDEX*\" | head -n1)
            cp \"\$APK_FILE\" \"/work/${PKG_NAME}-${PKG_VER}-r1_noarch.apk\"
          "

          sudo chown -R $(id -u):$(id -g) "${APK_DIR}"
          mv "${APK_DIR}"/*_noarch.apk ./

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ env.VERSION }}
          path: |
            *.ipk
            *.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: |
            *.ipk
            *.apk
          name: "Release ${{ env.VERSION }}"
          tag_name: "v${{ env.VERSION }}"
          prerelease: false
          draft: false
          body: |
            ## luci-app-lpac-manager ${{ env.VERSION }}

            eSIM management package for OpenWrt.

            ### Artifacts
            - `${{ env.PKG_NAME }}_${{ env.VERSION }}_all.ipk` for OpenWrt 24.x / opkg
            - `${{ env.PKG_NAME }}-${{ env.VERSION }}-r1_noarch.apk` for OpenWrt 25.12+ / apk (Alpine v3 ADB format)

            ### Install
            ```sh
            # OpenWrt 24.x
            opkg update
            opkg install luci-app-lpac-manager_${{ env.VERSION }}_all.ipk

            # OpenWrt 25.12+
            apk add --allow-untrusted luci-app-lpac-manager-${{ env.VERSION }}-r1_noarch.apk
            ```
